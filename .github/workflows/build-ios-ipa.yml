name: Build iOS IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Build environment'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 45
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Install Capacitor iOS dependencies
        run: npx cap sync ios

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Install iOS simulator platform
        run: |
          set -euo pipefail
          xcodebuild -version
          xcodebuild -showsdks
          xcrun simctl list runtimes || true

          if xcrun simctl list runtimes | grep -q "iOS 18.0"; then
            exit 0
          fi

          for attempt in 1 2 3; do
            echo "Installing iOS simulator platform (attempt ${attempt}/3)"
            if xcodebuild -downloadPlatform iOS; then
              break
            fi
            sleep $((attempt * 20))
          done

          xcrun simctl list runtimes
          xcrun simctl list runtimes | grep -q "iOS 18.0"

      - name: Build unsigned IPA
        run: |
          cd ios/App
          mkdir -p build
          # GitHub Actions macos-latest runners do not ship the iPhoneOS platform
          # for Xcode 16. Build for the simulator SDK (always present) instead.
          # For a real-device IPA, run build-ios-ipa.sh locally on a Mac with Xcode.
          xcodebuild \
            -project App.xcodeproj \
            -target App \
            -configuration Release \
            -sdk iphonesimulator \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            ARCHS="arm64" \
            build
          APP_PATH=$(find build -name "App.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Could not find built .app bundle"
            exit 1
          fi
          echo "Found app bundle: $APP_PATH"
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          cd build
          zip -qr SoloLevelingSystem.ipa Payload
          ls -lh SoloLevelingSystem.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: SoloLevelingSystem-iOS-simulator
          path: ios/App/build/SoloLevelingSystem.ipa
          retention-days: 30

      - name: Upload build logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-build-logs
          path: ios/App/build/
          retention-days: 7
